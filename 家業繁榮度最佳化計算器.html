<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>家業繁榮度最佳化計算器</title>
<style>
  body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:#f5f6f8;margin:0;color:#222}
  .wrap{max-width:1180px;margin:28px auto;padding:0 16px}
  h1{font-size:28px;margin:0 0 16px}
  .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:16px}
  label{font-weight:700;margin-right:8px}
  input{padding:8px 10px;border:1px solid #bbb;border-radius:8px;font-size:16px;box-sizing:border-box;width:120px;text-align:center}
  table{width:100%;border-collapse:collapse;margin-top:12px;background:white}
  th,td{border:1px solid #ddd;padding:8px;text-align:center}
  th{background:#eef1f6;white-space:nowrap}
  td input{width:100%;border:0;background:transparent;text-align:center}
  .readonly{background:#eef3ff;font-weight:700;color:#1e3a8a}
  .buyQty{background:#fff7ed;font-weight:800;color:#9a3412}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  button{border:0;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;background:#2563eb;color:#fff;font-size:15px}
  button.secondary{background:#64748b}
  button.danger{background:#dc2626}
  .result{font-size:18px;line-height:1.7}
  .good{color:#0f766e;font-weight:800}
  .warn{color:#b45309;font-weight:800}
  .small{font-size:13px;color:#666}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px}
  .box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:12px}
  .box b{display:block;font-size:14px;color:#475569}.box span{font-size:24px;font-weight:800}
  .toprow{display:flex;gap:18px;flex-wrap:wrap;align-items:end}
  .field{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  @media(max-width:760px){.grid{grid-template-columns:1fr 1fr} table{font-size:13px} th,td{padding:6px} input{font-size:14px;width:100px}.toprow{display:block}.field{margin:8px 0}}
</style>
</head>
<body>
<div class="wrap">
  <h1>家業繁榮度最佳化計算器</h1>

  <div class="card">
    <div class="toprow">
      <div class="field"><label>距離升級繁榮度</label><input id="target" type="number" value="12990" min="0"></div>
      <div class="field"><label>升級家業所需米錢</label><input id="upgradeCost" type="number" value="80000" min="0"></div>
      <div class="field"><label>週數</label><input id="weeks" type="number" value="1" min="1" step="1"></div>
    </div>
    <div class="small">最大可買數量會依照「品種數 × 每週每品種數 × 週數」自動計算。目標是在達到指定繁榮度以上的前提下，找出家具米錢最低的購買組合。</div>
    <div class="small">注意! 每週家具數量都會更新。 本網頁為作者本人私人使用，本人不負任何責任以及損失。</div>
  </div>

  <div class="card">
    <b>家具資料</b>
    <table id="dataTable">
      <thead>
        <tr>
          <th>單件繁榮度</th>
          <th>單件價格</th>
          <th>品種數</th>
          <th>每週每品種數</th>
          <th>最大可買數量</th>
          <th>購買數量</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="btns">
      <button onclick="solve()">開始計算</button>
      <button class="secondary" onclick="addRow()">新增家具</button>
      <button class="danger" onclick="removeRow()">刪除最後一列</button>
      <button class="secondary" onclick="loadExample()">載入範例資料</button>
      <button class="secondary" onclick="saveCurrentAsExample()">將目前資料設為範例</button>
      <button class="secondary" onclick="restoreBuiltInExample()">還原內建範例</button>
      <button class="secondary" onclick="clearRows()">清空資料</button>
    </div>
  </div>

  <div class="card">
    <b>最佳結果</b>
    <div class="grid" style="margin-top:12px">
      <div class="box"><b>總繁榮度</b><span id="totalProsperity">-</span></div>
      <div class="box"><b>超出繁榮度</b><span id="overProsperity">-</span></div>
      <div class="box"><b>家具米錢</b><span id="furnitureCost">-</span></div>
      <div class="box"><b>總需米錢</b><span id="totalCost">-</span></div>
    </div>
    <div id="status" class="result" style="margin-top:12px"></div>
  </div>
</div>

<script>
// 欄位順序：單件繁榮度、單件價格、品種數、每週每品種數
const builtInRows = [
  [10,100,5,100],
  [12,150,7,100],
  [16,200,23,100],
  [20,250,28,100],
  [23,300,25,100],
  [26,400,30,100],
  [30,500,32,100],
  [35,600,18,100],
  [37,700,7,100],
  [40,800,1,100]
];

function weeks(){ return Math.max(1, Math.floor(Number(document.getElementById('weeks').value)||1)); }

function render(rows){
  const tbody=document.querySelector('#dataTable tbody'); tbody.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    for(let i=0;i<4;i++){
      const td=document.createElement('td');
      td.innerHTML=`<input type="number" min="0" value="${r[i]}">`;
      tr.appendChild(td);
    }
    const maxTd=document.createElement('td'); maxTd.className='readonly maxQty'; maxTd.textContent=''; tr.appendChild(maxTd);
    const buyTd=document.createElement('td'); buyTd.className='buyQty'; buyTd.textContent=''; tr.appendChild(buyTd);
    tbody.appendChild(tr);
  });
  updateMaxQty();
}

function updateMaxQty(){
  const w=weeks();
  document.querySelectorAll('#dataTable tbody tr').forEach(tr=>{
    const v=[...tr.querySelectorAll('input')].map(x=>Number(x.value)||0);
    const max=Math.floor(v[2]*v[3]*w);
    tr.querySelector('.maxQty').textContent=max.toLocaleString();
  });
}

function getRows(){
  updateMaxQty();
  const w=weeks();
  return [...document.querySelectorAll('#dataTable tbody tr')].map(tr=>{
    const v=[...tr.querySelectorAll('input')].map(x=>Number(x.value)||0);
    const p=Math.floor(v[0]);
    const cost=Math.floor(v[1]);
    const species=Math.floor(v[2]);
    const per=Math.floor(v[3]);
    const max=Math.floor(species*per*w);
    return {p,cost,species,per,max};
  }).filter(r=>r.max>0 && r.p>0 && r.cost>=0);
}

function rowsForRender(){ return getRows().map(r=>[r.p,r.cost,r.species,r.per]); }
function addRow(){ render([...rowsForRender(), [10,100,1,100]]); clearResult(false); }
function removeRow(){ const rows=rowsForRender(); rows.pop(); render(rows); clearResult(false); }
function clearRows(){ render([]); clearResult(); }

function getExampleRows(){
  try{
    const saved = localStorage.getItem('furniture_optimizer_example_rows_v4');
    if(saved){
      const rows = JSON.parse(saved);
      if(Array.isArray(rows) && rows.length>0) return rows;
    }
  }catch(e){}
  return builtInRows;
}
function loadExample(){ render(getExampleRows()); clearResult(); }
function saveCurrentAsExample(){
  const rows=rowsForRender();
  localStorage.setItem('furniture_optimizer_example_rows_v4', JSON.stringify(rows));
  document.getElementById('status').innerHTML='<span class="good">已將目前家具資料設為範例資料。</span> 之後按「載入範例資料」會載入這組資料。';
}
function restoreBuiltInExample(){
  localStorage.removeItem('furniture_optimizer_example_rows_v4');
  render(builtInRows);
  clearResult(false);
  document.getElementById('status').innerHTML='<span class="good">已還原內建範例資料。</span>';
}
function clearResult(clearStatus=true){
  ['totalProsperity','overProsperity','furnitureCost','totalCost'].forEach(id=>document.getElementById(id).textContent='-');
  if(clearStatus) document.getElementById('status').innerHTML='';
  document.querySelectorAll('.buyQty').forEach(td=>td.textContent='');
}

function solve(){
  const target=Math.floor(Number(document.getElementById('target').value)||0);
  const upgradeCost=Math.floor(Number(document.getElementById('upgradeCost').value)||0);
  const items=getRows();
  clearResult(false);
  if(target<=0 || items.length===0){ document.getElementById('status').innerHTML='<span class="warn">請確認目標與家具資料。</span>'; return; }

  const totalAvailableP=items.reduce((sum,it)=>sum+it.p*it.max,0);
  if(totalAvailableP < target){
    document.getElementById('status').innerHTML=`<span class="warn">目前最大可提供繁榮度只有 ${totalAvailableP.toLocaleString()}，無法達到目標。</span>`;
    return;
  }

  const maxP=Math.max(...items.map(x=>x.p));
  const limit=target + maxP * 3;
  const INF=Number.MAX_SAFE_INTEGER;
  const dp=Array(limit+1).fill(INF);
  const path=Array(limit+1).fill(null);
  dp[0]=0;

  // 有數量上限的背包問題：使用二進位拆分，避免購買數量超過最大可買數量
  items.forEach((it, idx)=>{
    let qty=it.max, k=1;
    while(qty>0){
      const take=Math.min(k, qty);
      const addP=it.p*take, addC=it.cost*take;
      const oldDp=dp.slice();
      const oldPath=path.slice();
      for(let s=0; s<=limit; s++){
        if(oldDp[s]!==INF){
          const ns=Math.min(limit, s+addP);
          if(oldDp[s]+addC < dp[ns]){
            dp[ns]=oldDp[s]+addC;
            path[ns]={prev:oldPath[s], idx:idx, qty:take};
          }
        }
      }
      qty-=take; k*=2;
    }
  });

  let bestS=-1, bestC=INF;
  for(let s=target; s<=limit; s++){
    if(dp[s]<bestC){ bestC=dp[s]; bestS=s; }
  }
  if(bestS<0 || bestC===INF){ document.getElementById('status').innerHTML='<span class="warn">目前資料無法達到目標繁榮度。</span>'; return; }

  const qtys=Array(items.length).fill(0);
  let node=path[bestS];
  while(node){ qtys[node.idx]+=node.qty; node=node.prev; }

  for(let i=0;i<items.length;i++){
    if(qtys[i] > items[i].max){
      document.getElementById('status').innerHTML='<span class="warn">計算異常：購買數量超過最大可買數量，請重新計算或檢查資料。</span>';
      return;
    }
  }

  document.querySelectorAll('.buyQty').forEach((td,i)=>td.textContent=(qtys[i]||0).toLocaleString());
  document.getElementById('totalProsperity').textContent=bestS.toLocaleString();
  document.getElementById('overProsperity').textContent=(bestS-target).toLocaleString();
  document.getElementById('furnitureCost').textContent=bestC.toLocaleString();
  document.getElementById('totalCost').textContent=(bestC+upgradeCost).toLocaleString();
  document.getElementById('status').innerHTML=`<span class="good">計算完成。</span> 週數：<b>${weeks()}</b>，最低家具米錢為 <b>${bestC.toLocaleString()}</b>，總需米錢為 <b>${(bestC+upgradeCost).toLocaleString()}</b>。`;
}

document.getElementById('weeks').addEventListener('input', ()=>{ updateMaxQty(); clearResult(); });
document.getElementById('target').addEventListener('input', ()=>clearResult());
document.getElementById('upgradeCost').addEventListener('input', ()=>clearResult());
document.addEventListener('input', (e)=>{ if(e.target.closest('#dataTable')){ updateMaxQty(); clearResult(); } });

render(getExampleRows());
solve();
</script>
</body>
</html>
